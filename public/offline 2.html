<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#124a85" />
    <meta name="robots" content="noindex" />
    <title>Offline · Nantucket Event Co.</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f1e8;
        color: #1e293b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top))
          max(20px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom))
          max(20px, env(safe-area-inset-left));
      }

      main {
        width: min(100%, 480px);
        padding: 32px;
        border: 1px solid #d6dce5;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 12px 30px rgba(30, 41, 59, 0.09);
        text-align: center;
      }

      img {
        width: min(100%, 270px);
        height: auto;
        margin: 0 auto 28px;
      }

      h1 {
        margin: 0;
        color: #124a85;
        font-size: clamp(1.7rem, 8vw, 2.5rem);
        line-height: 1.05;
      }

      p {
        margin: 16px 0 0;
        color: #475569;
        font-size: 1rem;
        line-height: 1.6;
      }

      button {
        min-height: 48px;
        margin-top: 24px;
        padding: 0 20px;
        border: 0;
        border-radius: 8px;
        background: #124a85;
        color: #fff;
        font: inherit;
        font-weight: 750;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/nantucket-event-co-logo.svg" alt="Nantucket Event Co." />
      <h1>You’re offline</h1>
      <p>
        The app is installed and ready. Reconnect to load the current schedule,
        assignments, inventory, and packing updates.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
